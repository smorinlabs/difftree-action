name: PR Diff Tree

# Dogfood: run difftree-action on this repository's own pull requests so each PR
# carries its diff-tree comment. Doubles as a live end-to-end check.

on:
  pull_request:

# One run per PR; a newer push cancels the in-flight run so two runs can't race
# to create the sticky comment.
concurrency:
  group: difftree-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  difftree:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./
