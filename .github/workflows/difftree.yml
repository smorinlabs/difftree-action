name: PR Diff Tree

# Dogfood: run difftree-action on this repository's own pull requests so each PR
# carries its diff-tree comment. Doubles as a live end-to-end check.

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  difftree:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./
